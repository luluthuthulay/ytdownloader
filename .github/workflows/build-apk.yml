name: Build Flutter APK

# Code အသစ်တင်တိုင်း သို့မဟုတ် ကိုယ်တိုင်နှိပ်တိုင်း အလုပ်လုပ်မည်
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Generate Keystore & key.properties
        # ဤနေရာတွင် GitHub Server က Keystore ကို အလိုအလျောက် ဖန်တီးပေးပါမည်
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/upload-keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -storepass 12345678 -keypass 12345678 -dname "CN=VidMate Clone, OU=App, O=MyCompany, L=City, S=State, C=US"
          
          echo "storePassword=12345678" > android/key.properties
          echo "keyPassword=12345678" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VidMate-Clone-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
